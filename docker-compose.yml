version: '3.8'

services:
  postgres:
    image: postgres:16.1-alpine
    container_name: arco-serve-postgres
    environment:
      POSTGRES_DB: arco_serve
      POSTGRES_USER: arco_user
      POSTGRES_PASSWORD: arco_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arco-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arco_user -d arco_serve"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: arco-serve-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/arco_serve
      SPRING_DATASOURCE_USERNAME: arco_user
      SPRING_DATASOURCE_PASSWORD: arco_password
    ports:
      - "9960:9960"
    networks:
      - arco-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9960/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  arco-network:
    driver: bridge
