services:
  postgres:
    image: postgres:16-alpine
    container_name: arco-serve-postgres
    environment:
      - POSTGRES_DB=bitdb
      - POSTGRES_USER=devadmin
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devadmin -d bitdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arco-network

  redis:
    image: redis:7-alpine
    container_name: arco-serve-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arco-network

volumes:
  postgres_data:
  redis_data:

networks:
  arco-network:
    driver: bridge
