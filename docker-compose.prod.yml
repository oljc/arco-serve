services:
  # ه؛”ç”¨وœچهٹ،
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arco-serve-app-prod
    ports:
      - "10086:10086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=${DATABASE_URL:-jdbc:postgresql://postgres:5432/bitdb}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-20}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DATABASE=${REDIS_DATABASE:-0}
      - REDIS_POOL_MAX_ACTIVE=${REDIS_POOL_MAX_ACTIVE:-8}
      - REDIS_POOL_MAX_IDLE=${REDIS_POOL_MAX_IDLE:-8}
      - REDIS_POOL_MIN_IDLE=${REDIS_POOL_MIN_IDLE:-0}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION:-PT24H}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_TOKEN_EXPIRATION:-P7D}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VERIFICATION_CODE_LENGTH=${VERIFICATION_CODE_LENGTH:-6}
      - VERIFICATION_CODE_EXPIRATION_MINUTES=${VERIFICATION_CODE_EXPIRATION_MINUTES:-5}
      - VERIFICATION_CODE_MAX_ATTEMPTS_PER_HOUR=${VERIFICATION_CODE_MAX_ATTEMPTS_PER_HOUR:-5}
      - CAPTCHA_WIDTH=${CAPTCHA_WIDTH:-200}
      - CAPTCHA_HEIGHT=${CAPTCHA_HEIGHT:-100}
      - CAPTCHA_CODE_COUNT=${CAPTCHA_CODE_COUNT:-5}
      - CAPTCHA_INTERFERE_COUNT=${CAPTCHA_INTERFERE_COUNT:-20}
      - CAPTCHA_EXPIRATION_MINUTES=${CAPTCHA_EXPIRATION_MINUTES:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - arco-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # PostgreSQLو•°وچ®ه؛“
  postgres:
    image: postgres:16-alpine
    container_name: arco-serve-postgres-prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bitdb}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${POSTGRES_DB:-bitdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arco-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Redisç¼“ه­ک
  redis:
    image: redis:7-alpine
    container_name: arco-serve-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arco-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  arco-network:
    driver: bridge
