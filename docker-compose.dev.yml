version: '3.8'

services:
  postgres:
    image: postgres:16.1-alpine
    container_name: arco-serve-postgres-dev
    environment:
      POSTGRES_DB: arco_serve
      POSTGRES_USER: arco_user
      POSTGRES_PASSWORD: arco_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arco-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arco_user -d arco_serve"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:

networks:
  arco-dev-network:
    driver: bridge
